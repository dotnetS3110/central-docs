<aside class="sidebar" [class.open]="isOpen">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </div>
    <span class="logo-text">Docs<span>Hub</span></span>
    <button class="mobile-close" (click)="close.emit()">×</button>
  </div>

  <nav class="nav-links">
    @for (group of menuGroups; track group.category) {
    <div class="nav-category">{{ group.category }}</div>
    @for (item of group.items; track item.label) {
    <a [routerLink]="item.path" routerLinkActive="active" (click)="onLinkClick()" class="nav-item">
      <span class="icon" [innerHTML]="item.icon"></span>
      <span class="label">{{ item.label }}</span>
    </a>
    }
    }
  </nav>

  <div class="sidebar-footer">
    <div class="footer-top">
      <div class="user-profile">
        <div class="avatar">V</div>
        <div class="user-info">
          <p class="name">Vansh</p>
          <p class="role">FullStack Developer</p>
        </div>
      </div>
      <app-theme-toggle></app-theme-toggle>
    </div>
  </div>
</aside>
<div class="sidebar-overlay" [class.show]="isOpen" (click)="close.emit()"></div>
